name: Build Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/personal-mobile-image-generator:latest
            ghcr.io/${{ github.repository_owner }}/personal-mobile-image-generator:${{ github.sha }}

      - name: Build offline Docker archive
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag personal-mobile-image-generator:latest \
            --output type=docker,dest=/tmp/personal-mobile-image-generator-amd64.tar \
            .
          gzip -9 /tmp/personal-mobile-image-generator-amd64.tar

      - name: Publish offline download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view offline-latest >/dev/null 2>&1 || gh release create offline-latest \
            --title "Offline Docker image" \
            --notes "离线 Docker 镜像包。下载后可用 docker load 导入。"
          gh release upload offline-latest /tmp/personal-mobile-image-generator-amd64.tar.gz --clobber
